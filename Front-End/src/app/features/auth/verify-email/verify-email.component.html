<section class="main-content">
  <div class="login-card">
    <h2>Verify Email</h2>
    <p class="helper-text">Enter the verification code sent to your email.</p>

    <div class="error-message" *ngIf="errorMsg">
      {{ errorMsg }}
    </div>

    <div class="success-message" *ngIf="successMsg">
      {{ successMsg }}
    </div>

    <form [formGroup]="verifyEmailForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="Enter your email"
          required
        >
        <div class="error" *ngIf="verifyEmailForm.get('email')?.invalid && verifyEmailForm.get('email')?.touched">
          <span *ngIf="verifyEmailForm.get('email')?.errors?.['required']">Email is required</span>
          <span *ngIf="verifyEmailForm.get('email')?.errors?.['email']">Invalid email format</span>
        </div>
      </div>

      <div class="form-group">
        <label for="code">Verification Code</label>
        <input
          id="code"
          type="text"
          formControlName="code"
          inputmode="text"
          autocomplete="one-time-code"
          placeholder="Enter your code"
          autocapitalize="none"
          required
        >
        <div class="error" *ngIf="verifyEmailForm.get('code')?.invalid && verifyEmailForm.get('code')?.touched">
          <span *ngIf="verifyEmailForm.get('code')?.errors?.['required']">Code is required</span>
          <span *ngIf="verifyEmailForm.get('code')?.errors?.['minlength']">Code must be at least 4 characters</span>
          <span *ngIf="verifyEmailForm.get('code')?.errors?.['pattern']">Code can contain letters and numbers only</span>
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="loading || verifyEmailForm.invalid">
        <span *ngIf="loading" class="spinner"></span>
        <span *ngIf="!loading">Verify Email</span>
        <span *ngIf="loading">Loading...</span>
      </button>
    </form>

    <p class="auth-link">
      Back to
      <a routerLink="/login">Login</a>
    </p>
  </div>
</section>
