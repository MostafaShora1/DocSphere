<section class="main-content">
  <div class="login-card">

    <h2>Reset Password</h2>

    <div class="error-message" *ngIf="errorMsg">
      {{ errorMsg }}
    </div>

    <div class="success-message" *ngIf="successMsg">
      {{ successMsg }}
    </div>

    <form [formGroup]="resetPasswordForm" (ngSubmit)="resetPassword()">

      <div class="form-group">
        <label>New Password</label>
        <input type="password" formControlName="newPassword" required>
        <div class="error" *ngIf="resetPasswordForm.get('newPassword')?.invalid && resetPasswordForm.get('newPassword')?.touched">
          <span *ngIf="resetPasswordForm.get('newPassword')?.errors?.['required']">Password is required</span>
          <span *ngIf="resetPasswordForm.get('newPassword')?.errors?.['minlength']">Password must be at least 8 characters</span>
          <span *ngIf="resetPasswordForm.get('newPassword')?.errors?.['pattern']">Use uppercase, lowercase, number, and special character</span>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" formControlName="confirmPassword" required>
        <div class="error" *ngIf="(resetPasswordForm.get('confirmPassword')?.touched && resetPasswordForm.get('confirmPassword')?.errors?.['required']) || (resetPasswordForm.errors?.['passwordMismatch'] && resetPasswordForm.get('confirmPassword')?.touched)">
          <span *ngIf="resetPasswordForm.get('confirmPassword')?.errors?.['required']">Confirm password is required</span>
          <span *ngIf="resetPasswordForm.errors?.['passwordMismatch']">Passwords do not match</span>
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="resetPasswordForm.invalid">
        Reset Password
      </button>

      <div class="reset-links">
        <p>
          Remembered your password?
          <a routerLink="/login">Login here</a>
        </p>
      </div>

    </form>

  </div>
</section>
