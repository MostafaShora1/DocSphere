<section class="main-content">
  <div class="login-card">
    <h2>{{ 'AUTH.FORGOT.TITLE' | translate }}</h2>
    <p class="helper-text">{{ 'AUTH.FORGOT.DESC' | translate }}</p>

    <div class="error-message" *ngIf="errorMsg">
      {{ errorMsg }}
    </div>

    <div class="success-message" *ngIf="successMsg">
      {{ successMsg }}
    </div>

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">{{ 'AUTH.COMMON.EMAIL' | translate }}</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          [placeholder]="'AUTH.FORGOT.EMAIL_PLACEHOLDER' | translate"
          required
        >
        <div class="error" *ngIf="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched">
          <span *ngIf="forgotPasswordForm.get('email')?.errors?.['required']">{{ 'AUTH.VALIDATION.EMAIL_REQUIRED' | translate }}</span>
          <span *ngIf="forgotPasswordForm.get('email')?.errors?.['email']">{{ 'AUTH.VALIDATION.EMAIL_INVALID' | translate }}</span>
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="loading || forgotPasswordForm.invalid">
        <span *ngIf="loading" class="spinner"></span>
        <span *ngIf="!loading">{{ 'AUTH.FORGOT.SUBMIT' | translate }}</span>
        <span *ngIf="loading">{{ 'COMMON.LOADING' | translate }}</span>
      </button>
    </form>

    <p class="auth-link">
      {{ 'AUTH.FORGOT.REMEMBERED' | translate }}
      <a routerLink="/login">{{ 'NAV.LOGIN' | translate }}</a>
    </p>
  </div>
</section>
