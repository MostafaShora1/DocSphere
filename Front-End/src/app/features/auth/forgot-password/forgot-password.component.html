<section class="main-content">
  <div class="login-card">
    <h2>Forgot Password</h2>
    <p class="helper-text">Enter your email to receive reset instructions.</p>

    <div class="error-message" *ngIf="errorMsg">
      {{ errorMsg }}
    </div>

    <div class="success-message" *ngIf="successMsg">
      {{ successMsg }}
    </div>

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="Enter your email"
          required
        >
        <div class="error" *ngIf="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched">
          <span *ngIf="forgotPasswordForm.get('email')?.errors?.['required']">Email is required</span>
          <span *ngIf="forgotPasswordForm.get('email')?.errors?.['email']">Invalid email format</span>
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="loading || forgotPasswordForm.invalid">
        <span *ngIf="loading" class="spinner"></span>
        <span *ngIf="!loading">Send Reset Link</span>
        <span *ngIf="loading">Loading...</span>
      </button>
    </form>

    <p class="auth-link">
      Remembered your password?
      <a routerLink="/login">Login</a>
    </p>
  </div>
</section>
